<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusTimer Pro - AI-Powered Pomodoro Timer</title>
    <meta name="description" content="Free online Focus Timer with AI-powered focus session planning. Built for productivity.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-YOUR_AD_CLIENT" crossorigin="anonymous"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen">
    <!-- Google Ads Top -->
    <div class="text-center py-2">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-YOUR_AD_CLIENT" data-ad-slot="YOUR_AD_SLOT"></ins>
    </div>

    <div class="max-w-2xl mx-auto px-4 py-8">
        <!-- Hero -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">🎯 FocusTimer Pro</h1>
            <p class="text-gray-600">AI-powered Pomodoro timer. Stay focused, accomplish more.</p>
        </div>

        <!-- Timer Display -->
        <div class="bg-white rounded-2xl shadow-xl p-8 text-center mb-6">
            <div id="timer" class="text-6xl font-mono font-bold text-indigo-600 mb-6">25:00</div>
            
            <div class="flex justify-center gap-3 mb-6">
                <button onclick="startTimer()" class="bg-green-500 text-white px-6 py-2 rounded-full font-semibold hover:bg-green-600 transition">
                    Start
                </button>
                <button onclick="pauseTimer()" class="bg-yellow-500 text-white px-6 py-2 rounded-full font-semibold hover:bg-yellow-600 transition">
                    Pause
                </button>
                <button onclick="resetTimer()" class="bg-gray-500 text-white px-6 py-2 rounded-full font-semibold hover:bg-gray-600 transition">
                    Reset
                </button>
            </div>

            <div class="flex justify-center gap-4 text-sm">
                <button onclick="setDuration(25)" class="px-4 py-1 rounded-full border hover:bg-indigo-50">25 min</button>
                <button onclick="setDuration(45)" class="px-4 py-1 rounded-full border hover:bg-indigo-50">45 min</button>
                <button onclick="setDuration(60)" class="px-4 py-1 rounded-full border hover:bg-indigo-50">60 min</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-white rounded-xl p-4 text-center shadow">
                <div id="sessions" class="text-2xl font-bold text-indigo-600">0</div>
                <div class="text-sm text-gray-500">Sessions</div>
            </div>
            <div class="bg-white rounded-xl p-4 text-center shadow">
                <div id="focusTime" class="text-2xl font-bold text-green-600">0h</div>
                <div class="text-sm text-gray-500">Focus Time</div>
            </div>
            <div class="bg-white rounded-xl p-4 text-center shadow">
                <div id="streak" class="text-2xl font-bold text-orange-600">0</div>
                <div class="text-sm text-gray-500">Day Streak</div>
            </div>
        </div>

        <!-- AI Feature -->
        <div class="bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl p-6 text-white mb-6">
            <h3 class="font-bold text-lg mb-2">🤖 AI Focus Planner</h3>
            <p class="text-sm opacity-90 mb-4">Let AI suggest the best focus schedule based on your tasks.</p>
            <button onclick="getAIPlan()" class="bg-white text-indigo-600 px-4 py-2 rounded-full font-semibold text-sm hover:bg-indigo-50 transition">
                Get My Plan →
            </button>
        </div>

        <!-- Ad -->
        <div class="text-center py-4">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-YOUR_AD_CLIENT" data-ad-slot="YOUR_AD_SLOT_2"></ins>
        </div>

        <!-- Footer -->
        <div class="text-center text-gray-400 text-sm mt-8">
            <p>© 2026 FocusTimer Pro · Free Online Tool</p>
        </div>
    </div>

    <script>
        let timeLeft = 25 * 60;
        let timerId = null;
        let isRunning = false;
        let sessions = 0;

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    sessions++;
                    document.getElementById('sessions').textContent = sessions;
                    alert('🎉 Session complete! Take a break.');
                    isRunning = false;
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerId);
            isRunning = false;
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = 25 * 60;
            updateDisplay();
        }

        function setDuration(minutes) {
            pauseTimer();
            timeLeft = minutes * 60;
            updateDisplay();
        }

        function getAIPlan() {
            alert('🤖 AI Plan: 25min work + 5min break, repeat 4 times, then 30min break. Ready to start?');
        }

        // Load saved stats
        const saved = localStorage.getItem('focusStats');
        if (saved) {
            const stats = JSON.parse(saved);
            sessions = stats.sessions || 0;
            document.getElementById('sessions').textContent = sessions;
        }

        // Save stats
        function saveStats() {
            localStorage.setItem('focusStats', JSON.stringify({ sessions }));
        }
    </script>
</body>
</html>
