<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FocusTimer Pro - AI-Powered Pomodoro</title>
    <meta name="description" content="Free AI-powered Focus Timer. Let AI plan your day, track focus sessions, boost productivity.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Mobile Header -->
    <div class="gradient-bg px-4 py-6 text-white">
        <div class="flex items-center justify-between mb-4">
            <div>
                <h1 class="text-xl font-bold">🎯 FocusTimer Pro</h1>
                <p class="text-xs text-white/70">AI-Powered Productivity</p>
            </div>
            <button onclick="showStats()" class="bg-white/20 px-3 py-2 rounded-full text-sm">
                📊 Stats
            </button>
        </div>
        
        <!-- Timer Circle -->
        <div class="flex justify-center mb-4">
            <div class="relative w-48 h-48">
                <svg class="w-full h-full transform -rotate-90">
                    <circle cx="96" cy="96" r="88" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="8"/>
                    <circle id="progressRing" cx="96" cy="96" r="88" fill="none" stroke="white" stroke-width="8" 
                        stroke-dasharray="553" stroke-dashoffset="0" stroke-linecap="round"/>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <div id="timer" class="text-4xl font-bold font-mono">25:00</div>
                    <div id="status" class="text-xs text-white/70 mt-1">Ready to focus</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex justify-center gap-3">
            <button onclick="startTimer()" id="startBtn" class="bg-white text-purple-600 px-8 py-3 rounded-full font-bold shadow-lg active:scale-95 transition-transform">
                Start
            </button>
            <button onclick="pauseTimer()" id="pauseBtn" class="bg-yellow-500 text-white px-6 py-3 rounded-full font-bold shadow-lg hidden active:scale-95 transition-transform">
                ⏸️
            </button>
            <button onclick="resetTimer()" class="bg-white/20 px-4 py-3 rounded-full active:scale-95 transition-transform">
                🔄
            </button>
        </div>

        <!-- Duration Selector -->
        <div class="flex justify-center gap-2 mt-4">
            <button onclick="setDuration(15)" class="text-xs px-3 py-1 rounded-full bg-white/20 active:scale-95 transition-transform">15m</button>
            <button onclick="setDuration(25)" class="text-xs px-3 py-1 rounded-full bg-white font-bold active:scale-95 transition-transform">25m</button>
            <button onclick="setDuration(45)" class="text-xs px-3 py-1 rounded-full bg-white/20 active:scale-95 transition-transform">45m</button>
            <button onclick="setDuration(60)" class="text-xs px-3 py-1 rounded-full bg-white/20 active:scale-95 transition-transform">60m</button>
        </div>
    </div>

    <!-- Quick Stats -->
    <div class="px-4 -mt-4">
        <div class="grid grid-cols-3 gap-2">
            <div class="bg-white rounded-xl p-3 text-center shadow-sm">
                <div id="sessions" class="text-2xl font-bold text-purple-600">0</div>
                <div class="text-xs text-gray-500">Sessions</div>
            </div>
            <div class="bg-white rounded-xl p-3 text-center shadow-sm">
                <div id="totalMinutes" class="text-2xl font-bold text-green-600">0</div>
                <div class="text-xs text-gray-500">Minutes</div>
            </div>
            <div class="bg-white rounded-xl p-3 text-center shadow-sm">
                <div id="streak" class="text-2xl font-bold text-orange-500">0</div>
                <div class="text-xs text-gray-500">🔥 Streak</div>
            </div>
        </div>
    </div>

    <!-- AI Features Section -->
    <div class="px-4 mt-4 space-y-3 pb-20">
        <!-- AI Task Input -->
        <div class="bg-white rounded-2xl p-4 shadow-sm">
            <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                <span class="text-xl">🤖</span> AI Task Planner
            </h3>
            <textarea id="taskInput" rows="2" placeholder="输入今天的任务，例如：完成项目报告、回复客户邮件、学习英语" 
                class="w-full p-3 bg-gray-50 rounded-xl text-sm border-0 focus:ring-2 focus:ring-purple-500 resize-none"></textarea>
            <button onclick="getAIPlan()" id="aiBtn" class="w-full mt-2 bg-gradient-to-r from-purple-500 to-indigo-500 text-white py-3 rounded-xl font-semibold text-sm active:scale-98 transition-transform">
                🚀 Get AI Plan
            </button>
        </div>

        <!-- AI Task Breakdown -->
        <div id="taskList" class="bg-white rounded-2xl p-4 shadow-sm hidden">
            <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                <span class="text-xl">📋</span> AI 任务计划
            </h3>
            <div id="tasks"></div>
            <button onclick="startAIPlan()" class="w-full mt-3 bg-green-500 text-white py-3 rounded-xl font-semibold text-sm">
                ▶️ 开始执行计划
            </button>
        </div>

        <!-- Daily Review -->
        <div class="bg-white rounded-2xl p-4 shadow-sm">
            <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                <span class="text-xl">📈</span> 每日复盘
            </h3>
            <div id="reviewContent" class="text-sm text-gray-600">
                <p class="text-center py-4 text-gray-400">完成一些专注后再来看复盘吧！</p>
            </div>
            <button onclick="generateReview()" class="w-full mt-2 bg-gray-100 text-gray-700 py-3 rounded-xl font-semibold text-sm">
                📝 生成 AI 复盘
            </button>
        </div>

        <!-- Ad Placeholder -->
        <div class="bg-gray-100 rounded-xl p-4 text-center text-xs text-gray-400">
            广告位招租
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t px-4 py-2 flex justify-around">
        <button onclick="showSection('timer')" class="flex flex-col items-center p-2 text-purple-600">
            <span class="text-xl">⏱️</span>
            <span class="text-xs">计时</span>
        </button>
        <button onclick="showSection('tasks')" class="flex flex-col items-center p-2 text-gray-400">
            <span class="text-xl">📋</span>
            <span class="text-xs">任务</span>
        </button>
        <button onclick="showSection('stats')" class="flex flex-col items-center p-2 text-gray-400">
            <span class="text-xl">📊</span>
            <span class="text-xs">统计</span>
        </button>
    </div>

    <script>
        // MiniMax API (已配置)
        const MINIMAX_KEY = "sk-api-e5xU18nX5LksJtB4tajGsEtF0wxNag1rxTSahApSUJOyYd78SEgjH6SVLJuJLWRxiruibM9WL2eCUVXKZ8JnEdOXi4cX0RQWArmIp4A3PAbe_vx_p19YvU0";
        
        let timeLeft = 25 * 60;
        let totalSeconds = 25 * 60;
        let timerId = null;
        let isRunning = false;
        let sessions = 0;
        let totalMinutes = 0;
        let streak = 0;
        let tasks = [];
        let currentTaskIndex = 0;

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            const progress = ((totalSeconds - timeLeft) / totalSeconds) * 553;
            document.getElementById('progressRing').style.strokeDashoffset = 553 - progress;
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('pauseBtn').classList.remove('hidden');
            document.getElementById('status').textContent = '专注中...保持！';
            
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    completeSession();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerId);
            isRunning = false;
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('pauseBtn').classList.add('hidden');
            document.getElementById('status').textContent = '已暂停';
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = 25 * 60;
            totalSeconds = 25 * 60;
            updateDisplay();
            document.getElementById('status').textContent = '准备开始专注';
        }

        function setDuration(minutes) {
            pauseTimer();
            timeLeft = minutes * 60;
            totalSeconds = minutes * 60;
            updateDisplay();
            document.getElementById('status').textContent = '准备开始专注';
        }

        function completeSession() {
            clearInterval(timerId);
            isRunning = false;
            sessions++;
            totalMinutes += Math.floor(totalSeconds / 60);
            document.getElementById('sessions').textContent = sessions;
            document.getElementById('totalMinutes').textContent = totalMinutes;
            
            document.getElementById('status').textContent = '🎉 完成！休息5分钟';
            alert('🎉 太棒了！休息一下吧~');
            
            saveStats();
            resetTimer();
        }

        async function getAIPlan() {
            const input = document.getElementById('taskInput').value.trim();
            if (!input) {
                alert('请先输入任务！');
                return;
            }

            const btn = document.getElementById('aiBtn');
            btn.textContent = '🤖 AI 思考中...';
            btn.disabled = true;

            try {
                const response = await fetch('https://api.minimax.chat/v1/text/chatcompletion_v2', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${MINIMAX_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "MiniMax-Text-01",
                        messages: [{
                            role: "user",
                            content: `把以下任务拆分成3-5个25分钟专注时段。直接返回JSON数组格式，只需要任务名称，不要其他文字：\n\n"${input}"`
                        }]
                    })
                });

                const data = await response.json();
                console.log('API Response:', data);
                
                let content = data.choices?.[0]?.message?.content || '';
                
                // 解析 JSON
                try {
                    if (content.includes('[')) {
                        const start = content.indexOf('[');
                        const end = content.lastIndexOf(']') + 1;
                        const jsonStr = content.substring(start, end);
                        tasks = JSON.parse(jsonStr);
                    } else {
                        // 备用解析
                        tasks = content.split('\n').filter(t => t.trim()).map(t => ({
                            name: t.replace(/^\d+[.、]\s*/, '').trim().substring(0, 50)
                        })).slice(0, 5);
                    }
                } catch(e) {
                    tasks = [{ name: input.substring(0, 50) }, { name: input.substring(50, 100) || '继续完成' }];
                }
                
                if (!tasks || tasks.length === 0) {
                    tasks = [{ name: input.substring(0, 50) }];
                }

                renderTasks();
                document.getElementById('taskList').classList.remove('hidden');
                
            } catch (e) {
                console.error(e);
                alert('AI 服务暂时不可用，请稍后重试');
            }

            btn.textContent = '🚀 Get AI Plan';
            btn.disabled = false;
        }

        function renderTasks() {
            const container = document.getElementById('tasks');
            container.innerHTML = tasks.map((t, i) => `
                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl mb-2">
                    <div class="w-8 h-8 rounded-full bg-purple-500 text-white flex items-center justify-center text-sm font-bold">
                        ${i + 1}
                    </div>
                    <span class="flex-1">${t.name}</span>
                </div>
            `).join('');
        }

        function startAIPlan() { console.log("clicked"); console.log("tasks:", tasks);
            if (tasks.length > 0) {
                document.getElementById('taskInput').value = tasks[0].name;
                setDuration(25);
                startTimer();
            }
        }

        async function generateReview() {
            if (sessions === 0) {
                alert('先完成一些专注时段吧！');
                return;
            }

            const content = document.getElementById('reviewContent');
            content.innerHTML = '<p class="text-center py-4">🤖 正在生成复盘...</p>';

            try {
                const response = await fetch('https://api.minimax.chat/v1/text/chatcompletion_v2', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${MINIMAX_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "MiniMax-Text-01",
                        messages: [{
                            role: "user",
                            content: `根据我的专注数据给出简短的 productivity 复盘和建议，要中文，100字以内：\n- 专注次数：${sessions}\n- 总时长：${totalMinutes}分钟`
                        }]
                    })
                });

                const data = await response.json();
                const review = data.choices?.[0]?.message?.content || `📊 今日：${sessions}次专注，${totalMinutes}分钟。继续加油！`;
                content.innerHTML = `<p class="leading-relaxed">${review}</p>`;
            } catch (e) {
                content.innerHTML = `<p>📊 今日：${sessions}次专注，${totalMinutes}分钟。保持专注！</p>`;
            }
        }

        function showStats() {
            alert(`📊 你的统计：\n\n专注次数：${sessions}\n总时长：${totalMinutes}分钟\n连续天数：${streak}天`);
        }

        function saveStats() {
            localStorage.setItem('focusStats', JSON.stringify({
                sessions, totalMinutes, streak,
                lastDate: new Date().toDateString()
            }));
        }

        function loadStats() {
            const saved = localStorage.getItem('focusStats');
            if (saved) {
                const stats = JSON.parse(saved);
                if (stats.lastDate !== new Date().toDateString()) {
                    streak = (stats.streak || 0) + 1;
                } else {
                    streak = stats.streak || 0;
                }
                sessions = stats.sessions || 0;
                totalMinutes = stats.totalMinutes || 0;
                document.getElementById('sessions').textContent = sessions;
                document.getElementById('totalMinutes').textContent = totalMinutes;
                document.getElementById('streak').textContent = streak;
            }
        }

        loadStats();
        updateDisplay();
    </script>
</body>
</html>
