<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FocusTimer Pro - AI番茄钟</title>
    <meta name="description" content="AI智能番茄钟，任务规划，每日复盘">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; touch-action: manipulation; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <div class="bg-gradient-to-r from-indigo-500 to-purple-600 px-4 py-6 text-white">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-xl font-bold">🎯 FocusTimer</h1>
                <p class="text-xs opacity-70">AI 番茄钟</p>
            </div>
        </div>
        
        <!-- Timer -->
        <div class="flex justify-center mb-4">
            <div class="relative w-44 h-44">
                <svg class="w-full h-full -rotate-90">
                    <circle cx="88" cy="88" r="80" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="10"/>
                    <circle id="ring" cx="88" cy="88" r="80" fill="none" stroke="white" stroke-width="10" stroke-dasharray="503" stroke-dashoffset="0" stroke-linecap="round"/>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <div id="timer" class="text-5xl font-bold font-mono">25:00</div>
                    <div id="status" class="text-xs opacity-70">准备</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex justify-center gap-3">
            <button id="startBtn" class="bg-white text-indigo-600 px-8 py-3 rounded-full font-bold shadow-lg active:opacity-80 transition">
                开始
            </button>
            <button id="pauseBtn" class="bg-yellow-500 text-white px-6 py-3 rounded-full font-bold shadow-lg hidden active:opacity-80 transition">
                ⏸
            </button>
            <button id="resetBtn" class="bg-white/20 px-4 py-3 rounded-full active:opacity-80 transition">
                🔄
            </button>
        </div>

        <!-- Duration -->
        <div class="flex justify-center gap-2 mt-4">
            <button onclick="setDur(15)" class="px-3 py-1 rounded-full bg-white/20 text-xs active:opacity-80">15分</button>
            <button onclick="setDur(25)" class="px-3 py-1 rounded-full bg-white font-bold text-xs active:opacity-80">25分</button>
            <button onclick="setDur(45)" class="px-3 py-1 rounded-full bg-white/20 text-xs active:opacity-80">45分</button>
            <button onclick="setDur(60)" class="px-3 py-1 rounded-full bg-white/20 text-xs active:opacity-80">60分</button>
        </div>
    </div>

    <!-- Stats -->
    <div class="px-4 -mt-3">
        <div class="grid grid-cols-3 gap-2">
            <div class="bg-white rounded-xl p-3 text-center shadow-sm">
                <div id="sessions" class="text-2xl font-bold text-indigo-600">0</div>
                <div class="text-xs text-gray-500">次数</div>
            </div>
            <div class="bg-white rounded-xl p-3 text-center shadow-sm">
                <div id="totalMin" class="text-2xl font-bold text-green-600">0</div>
                <div class="text-xs text-gray-500">分钟</div>
            </div>
            <div class="bg-white rounded-xl p-3 text-center shadow-sm">
                <div id="streak" class="text-2xl font-bold text-orange-500">0</div>
                <div class="text-xs text-gray-500">🔥 天</div>
            </div>
        </div>
    </div>

    <!-- AI Section -->
    <div class="px-4 mt-4 space-y-3 pb-20">
        <div class="bg-white rounded-2xl p-4 shadow-sm">
            <h3 class="font-bold text-gray-800 mb-3">🤖 AI 任务规划</h3>
            <textarea id="taskIn" rows="2" placeholder="输入今天的任务..." class="w-full p-3 bg-gray-50 rounded-xl text-sm resize-none border-0"></textarea>
            <button id="aiPlanBtn" class="w-full mt-2 bg-indigo-500 text-white py-3 rounded-xl font-semibold text-sm active:opacity-80 transition">
                🚀 AI 规划任务
            </button>
        </div>

        <div id="taskArea" class="bg-white rounded-2xl p-4 shadow-sm hidden">
            <h3 class="font-bold text-gray-800 mb-3">📋 任务列表</h3>
            <div id="taskList"></div>
            <button id="execBtn" class="w-full mt-3 bg-green-500 text-white py-3 rounded-xl font-semibold text-sm active:opacity-80 transition">
                ▶️ 开始执行
            </button>
        </div>

        <div class="bg-white rounded-2xl p-4 shadow-sm">
            <h3 class="font-bold text-gray-800 mb-3">📈 每日复盘</h3>
            <div id="review" class="text-sm text-gray-600 min-h-[60px]"></div>
            <button id="reviewBtn" class="w-full mt-2 bg-gray-100 text-gray-700 py-3 rounded-xl font-semibold text-sm active:opacity-80 transition">
                📝 生成复盘
            </button>
        </div>
    </div>

    <script>
        // Config
        const API_KEY = "sk-cp-fl-xznrdSc76n5XGW_JbrFYaRDdmSI7rfUL0x1GFGxGe1gjzU4apdyr-CqOofb_O2mvFLvwrspa7_p7spcPfdPKINoE3P7sTMu_N2BQuzGtl1pDULCj-b8Y";
        const API_URL = "https://api.minimax.chat/v1/text/chatcompletion_v2";

        // State
        let left = 25*60, total = 25*60, timer = null, running = false;
        let sessions = 0, mins = 0, streak = 0, taskList = [];

        // DOM
        const timerEl = document.getElementById('timer');
        const ringEl = document.getElementById('ring');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusEl = document.getElementById('status');
        const sessionsEl = document.getElementById('sessions');
        const minsEl = document.getElementById('totalMin');
        const streakEl = document.getElementById('streak');
        const taskIn = document.getElementById('taskIn');
        const taskArea = document.getElementById('taskArea');
        const taskListEl = document.getElementById('taskList');
        const reviewEl = document.getElementById('review');

        // Timer functions
        function update() {
            const m = Math.floor(left/60), s = left%60;
            timerEl.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            ringEl.style.strokeDashoffset = 503 - (total-left)/total*503;
        }

        function start() {
            if(running) return;
            running = true;
            startBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
            statusEl.textContent = '专注中...';
            timer = setInterval(() => {
                left--;
                update();
                if(left<=0) {
                    clearInterval(timer);
                    sessions++;
                    mins += Math.floor(total/60);
                    sessionsEl.textContent = sessions;
                    minsEl.textContent = mins;
                    statusEl.textContent = '🎉 完成！';
                    save();
                    alert('🎉 太棒了！休息一下吧~');
                    reset();
                }
            }, 1000);
        }

        function pause() {
            clearInterval(timer);
            running = false;
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            statusEl.textContent = '已暂停';
        }

        function reset() {
            pause();
            left = total;
            update();
            statusEl.textContent = '准备';
        }

        function setDur(m) {
            pause();
            total = m*60;
            left = total;
            update();
            statusEl.textContent = '准备';
        }

        // Button events
        startBtn.onclick = start;
        pauseBtn.onclick = pause;
        resetBtn.onclick = reset;

        // AI Plan
        document.getElementById('aiPlanBtn').onclick = async () => {
            const txt = taskIn.value.trim();
            if(!txt) { alert('请输入任务'); return; }
            const btn = document.getElementById('aiPlanBtn');
            btn.textContent = '🤖 思考中...';
            btn.disabled = true;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Authorization':'Bearer '+API_KEY,'Content-Type':'application/json'},
                    body: JSON.stringify({
                        model: 'abab6.5-chat',
                        messages: [{role:'user',content: `把任务"${txt}"拆成3-5个25分钟的小任务，直接返回JSON数组格式["任务1","任务2","任务3"]，不要其他文字`}]
                    })
                });
                const data = await res.json();
                let content = data.choices?.[0]?.message?.content || '';
                
                // Parse JSON
                try {
                    const arr = JSON.parse(content.match(/\[.*\]/)[0]);
                    taskList = arr.map(t=>({name:t, done:false}));
                } catch(e) {
                    taskList = [{name:txt.substring(0,30)},{name:txt.substring(30,60)||'继续'}];
                }
                
                taskListEl.innerHTML = taskList.map((t,i)=>`<div class="flex items-center gap-2 p-2 bg-gray-50 rounded-lg mb-2"><span class="w-6 h-6 rounded-full bg-indigo-500 text-white flex items-center justify-center text-sm">${i+1}</span><span>${t.name}</span></div>`).join('');
                taskArea.classList.remove('hidden');
            } catch(e) { alert('AI服务不可用'); console.log(e); }

            btn.textContent = '🚀 AI 规划任务';
            btn.disabled = false;
        };

        // Execute plan
        document.getElementById('execBtn').onclick = () => {
            if(taskList.length && taskList[0].name) {
                taskIn.value = taskList[0].name;
                setDur(25);
                start();
            }
        };

        // Review
        document.getElementById('reviewBtn').onclick = async () => {
            if(!sessions) { alert('先完成专注吧'); return; }
            reviewEl.textContent = '🤖 生成中...';
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Authorization':'Bearer '+API_KEY,'Content-Type':'application/json'},
                    body: JSON.stringify({
                        model: 'abab6.5-chat',
                        messages: [{role:'user',content: `复盘：今天${sessions}次专注，共${mins}分钟。给一句中文鼓励和建议，不超过50字`}]
                    })
                });
                const data = await res.json();
                reviewEl.textContent = data.choices?.[0]?.message?.content || `📊 ${sessions}次专注，${mins}分钟。加油！`;
            } catch(e) {
                reviewEl.textContent = `📊 今日：${sessions}次，${mins}分钟`;
            }
        };

        // Load stats
        const saved = JSON.parse(localStorage.getItem('ft_stats')||'{}');
        if(saved.sessions) sessions = saved.sessions;
        if(saved.mins) mins = saved.mins;
        if(saved.last !== new Date().toDateString()) streak = (saved.streak||0)+1;
        else streak = saved.streak||0;
        sessionsEl.textContent = sessions;
        minsEl.textContent = mins;
        streakEl.textContent = streak;

        function save() {
            localStorage.setItem('ft_stats',JSON.stringify({sessions,mins,streak,last:new Date().toDateString()}));
        }

        update();
    </script>
</body>
</html>
